<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body class=" m-5 p-5 h-100 bg-primary">
    <div class="container d-flex justify-content-center gap-5 bg-primary">
      <!--LOGIN-->
      <div
        class="Login border  rounded-1 bg-white w-25 h-25 p-1 mt-auto"
      >
        <h1><span class=" border-5 border-primary border-bottom">Lo</span>gin</h1>
        <br />
        <div class="innercontainer p-3">
          <i class="bi bi-envelope"></i>

          <input type="text" placeholder="Enter Your Email" />

          <hr />

          <i class="bi bi-lock"></i>
          <input type="password" placeholder="confirm a password" />
          <i class="bi bi-eye ps-3"></i>
          <hr />

          <input type="checkbox" name="remember" id="" />
          <label for="remember">Remember Me</label>
          <span id="forgetPassword"><a href="">Forget Password?</a></span>

          <br />

          <button class="button border rounded-1 text-white w-100 p-3 bg-primary m-2 mx-auto">
            Login Now
          </button>

          <br />
          <span>Don't Have an account?</span
          ><span><a href="">SignUp now</a></span>
        </div>
      </div>
      <!--REGISTER-->
      <div class="Register border  rounded-2 bg-white w-25 h-50 p-3">
        <h1><span class=" border-5 border-primary border-bottom">Re</span>gistation</h1>
        <div class="innercontainer1 pt-5">
          <i class="bi bi-person"></i>
          <input type="text" placeholder="Enter Your Name" />
          <hr />

          <i class="bi bi-envelope"></i>
          <input type="text" placeholder="Enter Your email" />
          <hr />
          <i class="bi bi-lock"></i>
          <input type="password" placeholder="Create your password" />
          <hr />
          <i class="bi bi-lock"></i>
          <input type="password" placeholder="Confirm your password" />
          <i class="bi bi-eye ps-3"></i>
          <hr />
          <input type="checkbox" /><span> I accept all terms & conditions</span>
          <br />
          <br />
          <button class="button border rounded-1 text-white w-100 p-3 bg-primary m-2 mx-auto ">
            Register Now
          </button>
          <br />
          <br />
          <span>Already have an account?<a href="">Login Now</a></span>
          <br /><br />
        </div>
      </div>
    </div>
  </body>
</html>
